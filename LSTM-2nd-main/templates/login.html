<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockSage - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />

  <style>
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }
    .card-shadow {
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
  </style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 to-gray-800 text-gray-200">

  <!-- Stock Chart Pattern Background -->
  <div class="absolute inset-0 overflow-hidden opacity-[0.05] pointer-events-none">
    <div class="absolute left-0 right-0 h-px bg-indigo-500/20" style="top: 15%"></div>
    <div class="absolute left-0 right-0 h-px bg-indigo-500/20" style="top: 35%"></div>
    <div class="absolute left-0 right-0 h-px bg-indigo-500/20" style="top: 55%"></div>
    <div class="absolute left-0 right-0 h-px bg-indigo-500/20" style="top: 75%"></div>
    <div class="absolute left-0 right-0 h-px bg-indigo-500/20" style="top: 95%"></div>
  </div>

  <!-- Login Container -->
  <div class="relative min-h-screen flex flex-col items-center justify-center p-4 z-10">
    <div class="w-full max-w-md">
      
      <!-- Logo -->
      <div class="flex justify-center mb-8">
        <div class="flex items-center gap-2 text-indigo-400">
          <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3v18h18"></path>
              <path d="m19 9-5 5-4-4-3 3"></path>
            </svg>
            <div class="absolute -inset-1 rounded-full bg-indigo-500 opacity-30 -z-10"></div>
          </div>
          <span class="font-bold text-xl tracking-tight">StockSage</span>
        </div>
      </div>

      <!-- Login Card -->
      <div class="border border-gray-700 rounded-lg shadow-sm backdrop-blur-sm bg-gray-800/90 card-shadow">
        <div class="p-6 space-y-1 text-center">
          <h1 class="text-2xl font-bold text-indigo-400">Sign in to StockSage</h1>
          <p class="text-gray-400">Enter your credentials to access predictions</p>
        </div>

        <div class="p-6 pt-0 space-y-4">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-300">Email</label>
            <input type="email" id="email" placeholder="you@example.com"
              class="w-full mt-1 px-3 py-2 rounded-md bg-gray-700 border border-gray-600 text-gray-200 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
            <input type="password" id="password" placeholder="••••••••"
              class="w-full mt-1 px-3 py-2 rounded-md bg-gray-700 border border-gray-600 text-gray-200 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
          </div>

          <div id="loginError" class="text-red-500 text-sm hidden"></div>

          <button id="loginButton"
            class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-2 px-4 rounded-md transition-colors">
            Sign In
          </button>

          <div class="text-center">
            <p class="text-sm text-gray-400">
              Don't have an account?
              <a href="/register" class="text-indigo-400 hover:underline">Create one</a>
            </p>
          </div>
        </div>

        <div class="flex flex-col text-center text-xs text-gray-500 border-t border-gray-700 p-4">
          <p>Powered by AI stock prediction algorithms</p>
          <p>© 2025 StockSage. All rights reserved.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Auth JS -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCQUHUCd8bKnRdv3AJm9InBlwbfyy4YVWw",
      authDomain: "stocksage-dee21.firebaseapp.com",
      projectId: "stocksage-dee21",
      storageBucket: "stocksage-dee21.appspot.com",
      messagingSenderId: "959336780489",
      appId: "1:959336780489:web:ef6bbb9b823efa312ef318",
      measurementId: "G-HW7K3FFKV6"
    };
    firebase.initializeApp(firebaseConfig);

    firebase.auth().onAuthStateChanged(function(user) {
      if (user) window.location.href = "/analysis";
    });

    function showLoading() {
      const btn = document.getElementById('loginButton');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
    }

    function hideLoading() {
      const btn = document.getElementById('loginButton');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }

    function showError(message) {
      const el = document.getElementById('loginError');
      el.textContent = message;
      el.classList.remove('hidden');
    }

    document.getElementById('loginButton').addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      document.getElementById('loginError').classList.add('hidden');
      if (!email || !password) {
        showError("Please enter both email and password");
        return;
      }

      showLoading();
      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(userCredential => {
          return userCredential.user.getIdToken().then(idToken => {
            sessionStorage.setItem('authToken', idToken);
            window.location.href = "/analysis";
          });
        })
        .catch(error => {
          hideLoading();
          let errorMsg;
          switch (error.code) {
            case 'auth/user-not-found':
              errorMsg = "No account found with this email address.";
              break;
            case 'auth/wrong-password':
              errorMsg = "Incorrect password, please try again.";
              break;
            case 'auth/too-many-requests':
              errorMsg = "Too many attempts. Try again later.";
              break;
            default:
              errorMsg = error.message;
          }
          showError(errorMsg);
        });
    });

    document.getElementById('password').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') document.getElementById('loginButton').click();
    });
  </script>
</body>
</html>
